<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Arial', sans-serif; }
        :root {
            --neon-pink: #ff1493;
            --neon-cyan: #00ffff;
            --neon-purple: #ff00ff;
            --neon-orange: #ffaa00;
            --whatsapp: #25D366;
            --bg-dark: #000000;
            --bg-card: #111111;
            --bg-item: #1a1a1a;
        }
        html { font-size: 13px; }
        body {
            background: var(--bg-dark);
            min-height: 100vh;
            padding: 10px;
            color: #ffffff;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 20, 147, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.15) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1400px; margin: 0 auto; width: 100%; }
        .header {
            background: var(--bg-card);
            border-radius: 25px 25px 0 0;
            padding: 20px;
            border: 3px solid var(--neon-pink);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.6);
            margin-bottom: 2px;
        }
        .header h1 { font-size: 2rem; margin-bottom: 8px; text-shadow: 0 0 15px var(--neon-pink); }
        .subtitle { font-size: 1.2rem; color: var(--neon-cyan); text-shadow: 0 0 12px var(--neon-cyan); margin-bottom: 12px; }
        .date-badge {
            background: rgba(255, 20, 147, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            font-weight: bold;
            font-size: 1rem;
        }
        .main-panel {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 0 0 25px 25px;
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 15px;
        }
        @media screen and (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            border: 3px solid;
            transition: all 0.3s;
        }
        .card:nth-child(1) { border-color: var(--neon-pink); box-shadow: 0 0 25px rgba(255, 20, 147, 0.4); }
        .card:nth-child(2) { border-color: var(--neon-cyan); box-shadow: 0 0 25px rgba(0, 255, 255, 0.4); }
        .card:nth-child(3) { border-color: var(--neon-purple); box-shadow: 0 0 25px rgba(255, 0, 255, 0.4); }
        .card-title {
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-bottom: 3px solid currentColor;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .materia-completa {
            background: #000000;
            border-radius: 15px;
            margin-bottom: 15px;
            padding: 15px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
        }
        .materia-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .materia-nombre { color: var(--neon-cyan); font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 8px var(--neon-cyan); }
        .materia-codigo { color: var(--neon-pink); font-size: 1rem; background: rgba(255,20,147,0.2); padding: 4px 10px; border-radius: 20px; }
        .materia-horario { display: flex; gap: 15px; margin-bottom: 12px; flex-wrap: wrap; font-size: 1rem; }
        .materia-docente { background: #1a1a1a; padding: 10px; border-radius: 10px; margin: 10px 0; border-left: 4px solid var(--neon-orange); }
        .docente-email { color: var(--neon-orange); font-size: 0.95rem; word-break: break-all; }
        .fechas-container { margin-top: 12px; }
        .fechas-titulo { color: var(--neon-cyan); font-size: 1rem; margin-bottom: 8px; font-weight: bold; }
        .fechas-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .fecha-badge {
            background: rgba(255,20,147,0.2);
            border: 1px solid var(--neon-pink);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .fecha-badge:hover { transform: scale(1.05); background: var(--neon-pink); color: black; }
        .fecha-badge.ap { background: rgba(0,255,255,0.2); border-color: var(--neon-cyan); }
        .fecha-badge.tutoria { background: rgba(255,165,0,0.2); border-color: orange; }
        .fecha-badge.convocatoria { background: rgba(255,0,255,0.2); border-color: var(--neon-purple); }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 0.85rem;
            background: transparent;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            color: black;
            font-weight: bold;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            border: 2px solid white;
            margin-top: 5px;
        }
        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendario-dia-header {
            text-align: center;
            font-weight: bold;
            color: var(--neon-cyan);
            padding: 6px 2px;
            border-bottom: 2px solid var(--neon-pink);
            font-size: 0.85rem;
        }
        .calendario-dia {
            aspect-ratio: 1;
            background: #111111;
            border: 1px solid var(--neon-pink);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .calendario-dia.today { background: var(--neon-pink); color: black; font-weight: bold; }
        .calendario-dia.has-evento { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
        .calendario-dia.has-foto { border-color: var(--neon-orange); box-shadow: 0 0 8px var(--neon-orange); }
        .calendario-dia:hover { transform: scale(1.05); background: var(--neon-pink); color: black; }
        
        .panel-dia {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            border: 2px solid var(--neon-orange);
        }
        .actividad-item {
            background: #000;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--neon-cyan);
        }
        .foto-item {
            position: relative;
            display: inline-block;
            margin: 5px;
        }
        .foto-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--neon-pink);
            cursor: pointer;
        }
        .link-item {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .link-clickeable {
            color: #00ffff;
            text-decoration: none;
            word-break: break-all;
            padding: 5px 10px;
            background: rgba(0,255,255,0.1);
            border-radius: 5px;
            display: inline-block;
            margin: 2px;
            border: 1px solid #00ffff;
            transition: all 0.3s;
        }
        .link-clickeable:hover { background: #00ffff; color: black; transform: scale(1.05); }
        .archivo-clickeable {
            color: #ff1493;
            text-decoration: none;
            word-break: break-all;
            padding: 5px 10px;
            background: rgba(255,20,147,0.1);
            border-radius: 5px;
            display: inline-block;
            margin: 2px;
            border: 1px solid #ff1493;
        }
        .editando-indicator {
            background: var(--neon-orange);
            color: black;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }
        .reportes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        .whatsapp-share {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: var(--whatsapp);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 0 20px var(--whatsapp);
            z-index: 1000;
            animation: pulse 2s infinite;
            border: none;
            color: white;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 20px var(--whatsapp); transform: scale(1); }
            50% { box-shadow: 0 0 35px var(--whatsapp); transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        textarea, input, select {
            background: #000;
            border: 2px solid var(--neon-pink);
            border-radius: 10px;
            color: white;
            padding: 10px;
            width: 100%;
        }
        .hidden { display: none; }
        .evento-card { background: #1a1a1a; padding: 12px; margin-bottom: 10px; border-radius: 10px; border-left: 6px solid #00ffff; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--neon-cyan); font-weight: 600; font-size: 1rem; }
        
        /* Estilos para el PDF */
        .pdf-container {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .pdf-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #ff1493;
            padding-bottom: 15px;
        }
        .pdf-header h1 { color: #ff1493; font-size: 28px; }
        .pdf-header h2 { color: #00ffff; font-size: 20px; margin-top: 10px; }
        .pdf-section {
            margin-bottom: 30px;
            page-break-inside: avoid;
        }
        .pdf-section h3 {
            background: #ff1493;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .pdf-materia {
            border-left: 4px solid #ff1493;
            padding-left: 15px;
            margin-bottom: 20px;
            page-break-inside: avoid;
        }
        .pdf-evento {
            border-left: 4px solid #00ffff;
            padding-left: 15px;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            page-break-inside: avoid;
        }
        .pdf-fecha {
            font-weight: bold;
            color: #ff1493;
            font-size: 18px;
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 2px solid #ff1493;
        }
        .pdf-links {
            margin-top: 8px;
            font-size: 12px;
            word-break: break-all;
        }
        .pdf-links a { color: #00ffff; text-decoration: none; }
        .pdf-nota {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-style: italic;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #ff1493;
            color: white;
        }
    </style>
</head>

                    html += `<div class="actividad-item"><strong>${m.nombre}</strong><br>📌 ${m.tipo}<br>⏰ ${m.hora}<br>👩‍🏫 ${m.docente}</div>`;
                });
            }
            if(eventosDia.length > 0){
                html += '<div style="color:#ff00ff; margin:8px 0;">📌 MIS EVENTOS:</div>';
                eventosDia.forEach(e => {
                    let linksEvHtml = '';
                    if(e.links && e.links.length){
                        linksEvHtml = '<div style="margin-top:5px;">🔗 ' + e.links.map(l => `<a href="${l}" target="_blank" class="link-clickeable">link</a>`).join(' ') + '</div>';
                    }
                    html += `<div class="actividad-item"><strong>${e.titulo}</strong><br>📝 ${e.descripcion || ''}<br>${linksEvHtml}</div>`;
                });
            }
            if(materias.length === 0 && eventosDia.length === 0) html = '<div style="text-align:center; padding:20px;">✨ Sin actividades programadas ✨</div>';
            actividadesDelDia.innerHTML = html;
            
            const dataDia = diarioPersonal[fechaSeleccionada] || { nota: '', fotos: [] };
            notaDelDia.value = dataDia.nota;
            fotosContainer.innerHTML = '';
            if(dataDia.fotos){
                dataDia.fotos.forEach((fotoBase64, idx) => {
                    const div = document.createElement('div');
                    div.className = 'foto-item';
                    div.innerHTML = `
                        <img src="${fotoBase64}" onclick="window.open('${fotoBase64}')">
                        <button class="btn-small" onclick="eliminarFoto(${idx})" style="position:absolute; top:-5px; right:-5px; background:red; border-radius:50%; width:20px; height:20px; padding:0; font-size:10px;">✖</button>
                    `;
                    fotosContainer.appendChild(div);
                });
            }
        }
        
        window.eliminarFoto = (idx) => {
            const dataDia = diarioPersonal[fechaSeleccionada] || { nota: '', fotos: [] };
            dataDia.fotos.splice(idx, 1);
            diarioPersonal[fechaSeleccionada] = dataDia;
            localStorage.setItem('diarioYobanaUnificado', JSON.stringify(diarioPersonal));
            cargarDiaSeleccionado();
            renderCalendario();
        };
        
        subirFoto.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            const dataDia = diarioPersonal[fechaSeleccionada] || { nota: '', fotos: [] };
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    dataDia.fotos.push(ev.target.result);
                    diarioPersonal[fechaSeleccionada] = dataDia;
                    localStorage.setItem('diarioYobanaUnificado', JSON.stringify(diarioPersonal));
                    cargarDiaSeleccionado();
                    renderCalendario();
                };
                reader.readAsDataURL(file);
            });
            subirFoto.value = '';
        });
        
        btnGuardarDiario.addEventListener('click', () => {
            const dataDia = diarioPersonal[fechaSeleccionada] || { nota: '', fotos: [] };
            dataDia.nota = notaDelDia.value;
            diarioPersonal[fechaSeleccionada] = dataDia;
            localStorage.setItem('diarioYobanaUnificado', JSON.stringify(diarioPersonal));
            alert('✅ Registro del día guardado');
            renderCalendario();
        });
        
        // ========== CALENDARIO ==========
        function renderCalendario() {
            const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            monthYearDisplay.textContent = `${months[currentMonth]} ${currentYear}`;
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let startDay = firstDay === 0 ? 6 : firstDay - 1;
            let html = '';
            ['L', 'M', 'M', 'J', 'V', 'S', 'D'].forEach(d => html += `<div class="calendario-dia-header">${d}</div>`);
            for(let i=0; i<startDay; i++) html += '<div class="calendario-dia" style="opacity:0.3"></div>';
            
            const today = new Date();
            for(let d=1; d<=daysInMonth; d++){
                const fechaStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const tieneEvento = eventos.some(e => e.fecha && e.fecha.startsWith(fechaStr));
                const tieneFoto = diarioPersonal[fechaStr] && diarioPersonal[fechaStr].fotos && diarioPersonal[fechaStr].fotos.length > 0;
                const esHoy = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
                let clase = 'calendario-dia';
                if(esHoy) clase += ' today';
                if(tieneEvento) clase += ' has-evento';
                if(tieneFoto) clase += ' has-foto';
                html += `<div class="${clase}" onclick="seleccionarFecha(${currentYear}, ${currentMonth}, ${d})">${d}</div>`;
            }
            calendarioGrid.innerHTML = html;
        }
        
        window.seleccionarFecha = (year, month, day) => {
            fechaSeleccionada = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            cargarDiaSeleccionado();
        };
        
        // ========== RECORDATORIO WHATSAPP ==========
        function enviarRecordatorioWhatsapp() {
            const hoy = new Date();
            const manana = new Date(hoy);
            manana.setDate(hoy.getDate() + 1);
            const fechaManana = manana.toISOString().split('T')[0];
            
            let msg = "📅 *RECORDATORIO DE ACTIVIDADES*\n\n";
            msg += `📌 *HOY (${formatearFechaMostrar(fechaSeleccionada)})*:\n`;
            const { materias: matHoy, eventos: evHoy } = obtenerActividadesPorFecha(fechaSeleccionada);
            if(matHoy.length === 0 && evHoy.length === 0) msg += "✨ Sin actividades\n";
            else {
                matHoy.forEach(m => msg += `🎭 ${m.nombre} - ${m.tipo}\n`);
                evHoy.forEach(e => msg += `📌 ${e.titulo}\n`);
            }
            
            msg += `\n📌 *MAÑANA (${formatearFechaMostrar(fechaManana)})*:\n`;
            const { materias: matManana, eventos: evManana } = obtenerActividadesPorFecha(fechaManana);
            if(matManana.length === 0 && evManana.length === 0) msg += "✨ Sin actividades programadas\n";
            else {
                matManana.forEach(m => msg += `🎭 ${m.nombre} - ${m.tipo}\n`);
                evManana.forEach(e => msg += `📌 ${e.titulo}\n`);
            }
            
            msg += "\n✨ *Agenda Yobana - Educación Artística* ✨";
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
        
        btnRecordatorioWhatsapp.addEventListener('click', enviarRecordatorioWhatsapp);
        
        // ========== VERIFICAR ALARMAS ==========
        window.verificarAlarmas = () => {
            const ahora = new Date();
            let activas = false;
            eventos.forEach(e => {
                const fecha = new Date(e.fecha);
                const diff = Math.round((fecha - ahora) / (1000 * 60));
                if (diff <= 5 && diff >= 0) {
                    alert(`🔔 ${e.titulo}`);
                    activas = true;
                }
            });
            if (!activas) alert('✨ No hay alarmas próximas');
        };
        
        // ========== EXPORTAR PDF COMPLETO (CON TODA LA INFORMACIÓN) ==========
        window.exportarPDFCompleto = (tipo) => {
            let titulo = '';
            let contenido = '';
            const fechaBase = new Date(fechaSeleccionada);
            
            if(tipo === 'dia'){
                titulo = `Reporte del Día: ${formatearFechaMostrar(fechaSeleccionada)}`;
                const { materias, eventos: evs } = obtenerActividadesPorFecha(fechaSeleccionada);
                const notaPersonal = diarioPersonal[fechaSeleccionada]?.nota || '';
                const fotos = diarioPersonal[fechaSeleccionada]?.fotos || [];
                
                contenido = `
                    <div class="pdf-section">
                        <h3>📅 FECHA: ${formatearFechaMostrar(fechaSeleccionada)}</h3>
                        
                        ${materias.length > 0 ? `
                            <h3>🎭 ACTIVIDADES ACADÉMICAS</h3>
                            ${materias.map(m => `
                                <div class="pdf-materia">
                                    <strong>${m.nombre}</strong> (${m.codigo})<br>
                                    📌 Tipo: ${m.tipo}<br>
                                    ⏰ Horario: ${m.hora}<br>
                                    👩‍🏫 Docente: ${m.docente} ${m.email ? `- ${m.email}` : ''}<br>
                                    📅 Semana: ${m.semana}
                                </div>
                            `).join('')}
                        ` : ''}
                        
                        ${evs.length > 0 ? `
                            <h3>📌 MIS EVENTOS</h3>
                            ${evs.map(e => `
                                <div class="pdf-evento">
                                    <strong>${e.titulo}</strong><br>
                                    🕐 Hora: ${new Date(e.fecha).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}<br>
                                    🎭 Tipo: ${e.tipo}<br>
                                    📝 Descripción:<br>
                                    <div style="white-space: pre-wrap; margin-top: 5px;">${e.descripcion || 'Sin descripción'}</div>
                                    ${e.links && e.links.length > 0 ? `
                                        <div class="pdf-links">
                                            🔗 Links:<br>
                                            ${e.links.map(l => `&nbsp;&nbsp;• <a href="${l}" target="_blank">${l.substring(0, 80)}...</a><br>`).join('')}
                                        </div>
                                    ` : ''}
                                    ${e.archivos && e.archivos.length > 0 ? `
                                        <div class="pdf-links">
                                            📎 Archivos:<br>
                                            ${e.archivos.map(a => `&nbsp;&nbsp;• <a href="${a}" target="_blank">${a.substring(0, 80)}...</a><br>`).join('')}
                                        </div>
                                    ` : ''}
                                </div>
                            `).join('')}
                        ` : ''}
                        
                        ${notaPersonal ? `
                            <h3>📝 NOTA PERSONAL DEL DÍA</h3>
                            <div class="pdf-nota">
                                ${notaPersonal.replace(/\n/g, '<br>')}
                            </div>
                        ` : ''}
                        
                        ${fotos.length > 0 ? `
                            <h3>📸 EVIDENCIAS (${fotos.length} foto(s))</h3>
                            <div style="text-align: center;">
                                ${fotos.map((foto, i) => `<img src="${foto}" style="max-width: 200px; margin: 10px; border: 2px solid #ff1493; border-radius: 10px;">`).join('')}
                            </div>
                        ` : ''}
                        
                        ${materias.length === 0 && evs.length === 0 && !notaPersonal && fotos.length === 0 ? `
                            <div style="text-align: center; padding: 40px;">✨ No hay actividades registradas para este día ✨</div>
                        ` : ''}
                    </div>
                `;
            }
            else if(tipo === 'semana'){
                titulo = `Reporte Semanal (7 días) desde ${formatearFechaMostrar(fechaSeleccionada)}`;
                contenido = '';
                for(let i=0; i<7; i++){
                    const fecha = new Date(fechaBase);
                    fecha.setDate(fechaBase.getDate() + i);
                    const fechaStr = fecha.toISOString().split('T')[0];
                    const { materias, eventos: evs } = obtenerActividadesPorFecha(fechaStr);
                    const notaPersonal = diarioPersonal[fechaStr]?.nota || '';
                    
                    contenido += `
                        <div class="pdf-fecha">📅 ${formatearFechaMostrar(fechaStr)}</div>
                        ${materias.length > 0 ? materias.map(m => `
                            <div class="pdf-materia">
                                <strong>${m.nombre}</strong> - ${m.tipo}<br>
                                ⏰ ${m.hora} | 👩‍🏫 ${m.docente}
                            </div>
                        `).join('') : ''}
                        ${evs.length > 0 ? evs.map(e => `
                            <div class="pdf-evento">
                                <strong>${e.titulo}</strong><br>
                                🕐 ${new Date(e.fecha).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}<br>
                                📝 ${e.descripcion ? e.descripcion.substring(0, 300) + (e.descripcion.length > 300 ? '...' : '') : ''}
                                ${e.links && e.links.length > 0 ? `<div class="pdf-links">🔗 ${e.links.length} link(s)</div>` : ''}
                            </div>
                        `).join('') : ''}
                        ${notaPersonal ? `<div class="pdf-nota">📝 ${notaPersonal.substring(0, 200)}${notaPersonal.length > 200 ? '...' : ''}</div>` : ''}
                        ${materias.length === 0 && evs.length === 0 && !notaPersonal ? '<div style="color: #999;">✨ Sin actividades</div>' : ''}
                        <hr style="margin: 15px 0;">
                    `;
                }
            }
            else { // mes
                const nombreMes = new Date(currentYear, currentMonth).toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
                titulo = `Reporte Mensual - ${nombreMes.charAt(0).toUpperCase() + nombreMes.slice(1)}`;
                contenido = '';
                const diasEnMes = new Date(currentYear, currentMonth + 1, 0).getDate();
                
                for(let d=1; d<=diasEnMes; d++){
                    const fechaStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const { materias, eventos: evs } = obtenerActividadesPorFecha(fechaStr);
                    
                    if(materias.length > 0 || evs.length > 0){
                        contenido += `
                            <div class="pdf-fecha">📅 ${formatearFechaMostrar(fechaStr)}</div>
                            ${materias.length > 0 ? `
                                <table style="margin-bottom: 10px;">
                                    <tr><th style="background: #ff1493;">Materia</th><th style="background: #ff1493;">Tipo</th><th style="background: #ff1493;">Horario</th></tr>
                                    ${materias.map(m => `<tr><td>${m.nombre}</td><td>${m.tipo}</td><td>${m.hora}</td></tr>`).join('')}
                                </table>
                            ` : ''}
                            ${evs.length > 0 ? evs.map(e => `
                                <div class="pdf-evento" style="margin-bottom: 10px;">
                                    <strong>${e.titulo}</strong><br>
                                    📝 ${e.descripcion ? e.descripcion.substring(0, 200) + (e.descripcion.length > 200 ? '...' : '') : ''}
                                </div>
                            `).join('') : ''}
                        `;
                    }
                }
                if(contenido === '') contenido = '<div style="text-align: center; padding: 40px;">✨ No hay actividades registradas en este mes ✨</div>';
            }
            
            const ventana = window.open('', '_blank');
            ventana.document.write(`
                <html>
                <head>
                    <title>${titulo}</title>
                    <style>
                        * { font-family: 'Segoe UI', Arial, sans-serif; }
                        body { 
                            padding: 40px; 
                            max-width: 1200px; 
                            margin: 0 auto;
                            background: white;
                            color: #333;
                        }
                        .pdf-header {
                            text-align: center;
                            margin-bottom: 30px;
                            border-bottom: 3px solid #ff1493;
                            padding-bottom: 20px;
                        }
                        .pdf-header h1 { color: #ff1493; font-size: 28px; margin: 0; }
                        .pdf-header h2 { color: #00cccc; font-size: 18px; margin: 10px 0 0; }
                        .pdf-header p { color: #666; margin-top: 10px; }
                        .pdf-section { margin-bottom: 30px; page-break-inside: avoid; }
                        .pdf-section h3 {
                            background: #ff1493;
                            color: white;
                            padding: 10px 15px;
                            border-radius: 8px;
                            margin: 20px 0 15px;
                            font-size: 18px;
                        }
                        .pdf-materia {
                            border-left: 4px solid #ff1493;
                            padding: 12px 15px;
                            margin-bottom: 12px;
                            background: #f9f9f9;
                            border-radius: 0 8px 8px 0;
                        }
                        .pdf-evento {
                            border-left: 4px solid #00cccc;
                            padding: 12px 15px;
                            margin-bottom: 12px;
                            background: #f9f9f9;
                            border-radius: 0 8px 8px 0;
                        }
                        .pdf-fecha {
                            font-size: 20px;
                            font-weight: bold;
                            color: #ff1493;
                            margin: 25px 0 15px;
                            border-bottom: 2px solid #ff1493;
                            padding-bottom: 5px;
                        }
                        .pdf-nota {
                            background: #f0f0f0;
                            padding: 12px 15px;
                            border-radius: 8px;
                            margin: 10px 0;
                            font-style: italic;
                        }
                        .pdf-links {
                            margin-top: 8px;
                            font-size: 11px;
                            word-break: break-all;
                            background: #e8e8e8;
                            padding: 8px;
                            border-radius: 5px;
                        }
                        .pdf-links a { color: #0066cc; text-decoration: none; }
                        table {
                            width: 100%;
                            border-collapse: collapse;
                            margin: 10px 0;
                        }
                        th, td {
                            border: 1px solid #ddd;
                            padding: 8px;
                            text-align: left;
                            vertical-align: top;
                        }
                        th { background: #ff1493; color: white; }
                        hr { margin: 20px 0; border: 0; border-top: 1px solid #ddd; }
                        @media print {
                            body { padding: 20px; }
                            .pdf-evento, .pdf-materia { break-inside: avoid; }
                        }
                    </style>
                </head>
                <body>
                    <div class="pdf-header">
                        <h1>📅 AGENDA YOBANA - EDUCACIÓN ARTÍSTICA</h1>
                        <h2>${titulo}</h2>
                        <p>Generado: ${new Date().toLocaleString('es-ES')}</p>
                    </div>
                    ${contenido}
                    <div style="text-align: center; margin-top: 40px; color: #999; font-size: 12px;">
                        Documento generado desde Agenda Personal Yobana 2026
                    </div>
                </body>
                </html>
            `);
            ventana.document.close();
            ventana.print();
        };
        
        // ========== RESPALDO ==========
        window.exportarRespaldo = () => {
            const backup = { eventos, diarioPersonal, notasGenerales: notasGeneralesTextarea.value, fecha: new Date().toISOString() };
            const link = document.createElement('a');
            link.download = `yobana_backup_${new Date().toISOString().slice(0,10)}.json`;
            link.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(backup, null, 2));
            link.click();
        };
        
        // ========== NOTAS GENERALES ==========
        if(notasGenerales) notasGeneralesTextarea.value = notasGenerales;
        notasGeneralesTextarea.addEventListener('input', () => localStorage.setItem('notasYobanaNeonCompleta', notasGeneralesTextarea.value));
        
        // ========== NAVEGACIÓN MESES ==========
        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            if(currentMonth === 0){ currentMonth = 11; currentYear--; }
            else currentMonth--;
            renderCalendario();
        });
        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            if(currentMonth === 11){ currentMonth = 0; currentYear++; }
            else currentMonth++;
            renderCalendario();
        });
        
        // ========== FECHA ACTUAL ==========
        function actualizarFecha() {
            document.getElementById('fechaActual').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
        }
        
        // ========== PERMISOS NOTIFICACIONES ==========
        if (Notification.permission !== 'granted') Notification.requestPermission();
        
        // ========== INICIALIZAR ==========
        function init(){
            mostrarHorario();
            mostrarEventos();
            renderCalendario();
            cargarDiaSeleccionado();
            actualizarFecha();
            setInterval(actualizarFecha, 60000);
        }
        
        init();
    </script>
</body>
</html>
