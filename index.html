<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🌸 YOBANA  RESPONSIVE - Educación Artística 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        :root {
            --neon-pink: #ff1493;
            --neon-cyan: #00ffff;
            --neon-purple: #ff00ff;
            --neon-orange: #ffaa00;
            --whatsapp: #25D366;
            --bg-dark: #000000;
            --bg-card: #111111;
            --bg-item: #1a1a1a;
        }

        html {
            font-size: 16px;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            padding: clamp(10px, 2vw, 20px);
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }

        /* Efecto de luz de fondo responsive */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 20, 147, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.15) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            position: relative;
        }

        /* HEADER NEON RESPONSIVE */
        .header {
            background: var(--bg-card);
            border-radius: 30px 30px 0 0;
            padding: clamp(20px, 4vw, 40px);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.5);
            margin-bottom: 2px;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .header h1 {
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            color: #ffffff;
            letter-spacing: 1px;
            word-break: break-word;
            line-height: 1.2;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 15px;
            word-break: break-word;
        }

        .date-badge {
            background: rgba(255, 20, 147, 0.2);
            padding: clamp(8px, 2vw, 12px) clamp(15px, 3vw, 25px);
            border-radius: 50px;
            display: inline-block;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            color: white;
            font-weight: bold;
            backdrop-filter: blur(5px);
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            width: fit-content;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* PANEL PRINCIPAL RESPONSIVE */
        .main-panel {
            background: var(--bg-card);
            padding: clamp(15px, 3vw, 25px);
            border-radius: 0 0 30px 30px;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            width: 100%;
        }

        /* GRID PRINCIPAL - TOTALMENTE RESPONSIVE */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(15px, 2.5vw, 25px);
            width: 100%;
        }

        /* TARJETAS NEON RESPONSIVE */
        .card {
            background: var(--bg-card);
            border-radius: clamp(15px, 3vw, 25px);
            padding: clamp(15px, 2.5vw, 25px);
            border: 2px solid;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            height: fit-content;
            width: 100%;
        }

        .card:nth-child(1) {
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
        }
        .card:nth-child(2) {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .card:nth-child(3) {
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .card-title {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            margin-bottom: 15px;
            border-bottom: 2px solid currentColor;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 8px currentColor;
            word-break: break-word;
        }

        /* HORARIO RESPONSIVE */
        .horario-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .semana-block {
            background: var(--bg-item);
            border-radius: 15px;
            padding: clamp(12px, 2vw, 15px);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
            width: 100%;
        }

        .semana-titulo {
            color: var(--neon-cyan);
            font-size: clamp(1.1rem, 2.8vw, 1.4rem);
            font-weight: bold;
            margin-bottom: 12px;
            text-shadow: 0 0 8px var(--neon-cyan);
            border-left: 4px solid var(--neon-pink);
            padding-left: 12px;
            word-break: break-word;
        }

        .clase-item {
            background: #000000;
            border-radius: 12px;
            margin-bottom: 10px;
            padding: clamp(12px, 2vw, 15px);
            border-left: 6px solid;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.2);
            width: 100%;
        }

        .clase-item:last-child {
            margin-bottom: 0;
        }

        .clase-item:hover {
            transform: translateX(5px);
            box-shadow: 0 0 25px var(--neon-pink);
        }

        .clase-hora {
            color: var(--neon-cyan);
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-cyan);
            margin-bottom: 5px;
            word-break: break-word;
        }

        .clase-nombre {
            color: white;
            font-size: clamp(0.95rem, 2.2vw, 1.1rem);
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-pink);
            word-break: break-word;
            line-height: 1.4;
        }

        .clase-codigo {
            color: var(--neon-pink);
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            margin-top: 5px;
            font-family: monospace;
            word-break: break-word;
        }

        .clase-duracion {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            background: rgba(255, 20, 147, 0.2);
            border: 1px solid var(--neon-pink);
            border-radius: 20px;
            color: var(--neon-pink);
            font-size: clamp(0.75rem, 1.8vw, 0.85rem);
        }

        /* FORMULARIO RESPONSIVE */
        .form-group {
            margin-bottom: 15px;
            width: 100%;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--neon-cyan);
            font-weight: 600;
            text-shadow: 0 0 5px var(--neon-cyan);
            font-size: clamp(0.9rem, 2.2vw, 1rem);
        }

        .form-group input, 
        .form-group textarea, 
        .form-group select {
            width: 100%;
            padding: clamp(10px, 2vw, 14px);
            background: #000000;
            border: 2px solid var(--neon-pink);
            border-radius: 12px;
            color: white;
            font-size: clamp(0.9rem, 2.2vw, 1rem);
            transition: all 0.3s;
        }

        .form-group input:focus, 
        .form-group textarea:focus, 
        .form-group select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            outline: none;
        }

        .btn {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            color: black;
            font-weight: bold;
            border: none;
            padding: clamp(12px, 2.5vw, 16px) clamp(15px, 3vw, 20px);
            border-radius: 12px;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            cursor: pointer;
            width: 100%;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid white;
            box-shadow: 0 0 15px var(--neon-pink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--neon-cyan), 0 0 45px var(--neon-pink);
        }

        .btn-small {
            padding: clamp(8px, 1.5vw, 10px) clamp(12px, 2vw, 18px);
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            background: transparent;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            white-space: nowrap;
        }

        /* EVENTOS RESPONSIVE */
        .eventos-container {
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-cyan) #000;
            width: 100%;
        }

        .eventos-container::-webkit-scrollbar {
            width: 6px;
        }
        .eventos-container::-webkit-scrollbar-track {
            background: #000;
        }
        .eventos-container::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
        }

        .evento-card {
            background: var(--bg-item);
            border-radius: 12px;
            padding: clamp(12px, 2vw, 18px);
            margin-bottom: 12px;
            border-left: 6px solid;
            position: relative;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.2);
            width: 100%;
        }

        .evento-fecha {
            color: var(--neon-cyan);
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 0 5px var(--neon-cyan);
            font-size: clamp(0.85rem, 2.2vw, 0.95rem);
            word-break: break-word;
        }

        /* CALENDARIO RESPONSIVE */
        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: clamp(3px, 1vw, 5px);
            margin-top: 15px;
            width: 100%;
        }

        .calendario-dia-header {
            text-align: center;
            font-weight: bold;
            color: var(--neon-cyan);
            padding: clamp(5px, 1.5vw, 8px);
            text-shadow: 0 0 5px var(--neon-cyan);
            border-bottom: 2px solid var(--neon-pink);
            font-size: clamp(0.7rem, 2vw, 0.9rem);
        }

        .calendario-dia {
            aspect-ratio: 1;
            background: #000000;
            border: 2px solid var(--neon-pink);
            border-radius: 8px;
            padding: 3px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(0.8rem, 2.2vw, 1rem);
        }

        .calendario-dia:hover {
            transform: scale(1.05);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .calendario-dia.today {
            background: var(--neon-pink);
            color: black;
            border-color: white;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .calendario-dia.has-evento {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            position: relative;
        }

        /* NOTAS CONFIDENCIALES RESPONSIVE */
        .notas-personales {
            margin-top: 20px;
            background: var(--bg-card);
            padding: clamp(12px, 2.5vw, 20px);
            border-radius: 15px;
            border: 3px dashed var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
            width: 100%;
        }

        .notas-personales textarea {
            width: 100%;
            padding: clamp(12px, 2.5vw, 18px);
            background: #000000;
            border: 2px solid var(--neon-cyan);
            border-radius: 12px;
            min-height: clamp(120px, 25vh, 150px);
            color: white;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-family: 'Courier New', monospace;
            resize: vertical;
        }

        /* WHATSAPP FLOTANTE RESPONSIVE */
        .whatsapp-share {
            position: fixed;
            bottom: clamp(15px, 4vw, 30px);
            right: clamp(15px, 4vw, 30px);
            background: transparent;
            border: 3px solid var(--whatsapp);
            color: var(--whatsapp);
            width: clamp(50px, 12vw, 70px);
            height: clamp(50px, 12vw, 70px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            cursor: pointer;
            box-shadow: 0 0 20px var(--whatsapp);
            transition: all 0.4s;
            z-index: 1000;
            backdrop-filter: blur(5px);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px var(--whatsapp); }
            50% { box-shadow: 0 0 40px var(--whatsapp); }
            100% { box-shadow: 0 0 20px var(--whatsapp); }
        }

        .whatsapp-share:hover {
            transform: scale(1.1);
            background: var(--whatsapp);
            color: black;
        }

        /* ===== MEDIA QUERIES PARA DIFERENTES PANTALLAS ===== */
        
        /* Tablets y pantallas medianas */
        @media screen and (max-width: 1100px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .card:last-child {
                grid-column: span 2;
            }
        }

        /* Móviles grandes */
        @media screen and (max-width: 768px) {
            html {
                font-size: 14px;
            }
            
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .card:last-child {
                grid-column: span 1;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .date-badge {
                white-space: normal;
                word-break: break-word;
            }
            
            .clase-item:hover {
                transform: none;
            }
            
            .btn:hover {
                transform: none;
            }
        }

        /* Móviles pequeños */
        @media screen and (max-width: 480px) {
            html {
                font-size: 12px;
            }
            
            .header {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .main-panel {
                padding: 12px;
            }
            
            .card {
                padding: 12px;
            }
            
            .calendario-dia-header {
                font-size: 0.7rem;
                padding: 3px;
            }
            
            .calendario-dia {
                font-size: 0.7rem;
            }
            
            .btn-small {
                padding: 6px 8px;
                font-size: 0.8rem;
                white-space: normal;
                word-break: break-word;
            }
            
            .evento-card .btn-small {
                padding: 4px 6px;
            }
        }

        /* Pantallas muy grandes */
        @media screen and (min-width: 1600px) {
            html {
                font-size: 18px;
            }
            
            .container {
                max-width: 1800px;
            }
            
            .dashboard-grid {
                gap: 30px;
            }
        }

        /* Orientación horizontal en móviles */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .notas-personales textarea {
                min-height: 80px;
            }
            
            .eventos-container {
                max-height: 200px;
            }
        }

        /* Ajustes para pantallas táctiles */
        @media (hover: none) and (pointer: coarse) {
            .clase-item:hover,
            .calendario-dia:hover,
            .btn:hover {
                transform: none;
            }
            
            .clase-item:active,
            .calendario-dia:active {
                transform: scale(0.98);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER NEON -->
        <div class="header">
            <h1>
                <i>Agenda Personal de Yobana </i>
            </h1>
            <div class="subtitle">
                ✦ Licenciatura en Educación Artística - Semestre IX ✦
            </div>
            <div class="date-badge" id="fechaActual"></div>
        </div>

        <!-- MAIN PANEL -->
        <div class="main-panel">
            <div class="dashboard-grid">
                <!-- COLUMNA 1: HORARIO SECUENCIAL -->
                <div class="card">
                    <div class="card-title" style="color: #ff1493;">
                        <span>⏰</span> HORARIO SÁBADOS
                    </div>
                    
                    <div class="horario-container" id="horarioContainer"></div>
                    
                    <div class="notas-personales">
                        <div class="card-title" style="color: #ff1493; margin-top: 0; border-bottom-color: #ff1493;">
                            <span>🔐</span> ZONA CONFIDENCIAL
                        </div>
                        <textarea id="notasConfidenciales" placeholder="📝 Escribe aquí tus apuntes personales... (se guarda automáticamente)"></textarea>
                    </div>
                </div>

                <!-- COLUMNA 2: CREAR EVENTOS Y CALENDARIO -->
                <div class="card">
                    <div class="card-title" style="color: #00ffff;">
                        <span>⏰</span> CREAR EVENTO
                    </div>
                    
                    <form id="eventoForm">
                        <div class="form-group">
                            <label>⚡ TÍTULO:</label>
                            <input type="text" id="eventoTitulo" placeholder="Ej: Parcial de Teatro" required>
                        </div>
                        
                        <div class="form-group">
                            <label>📅 FECHA Y HORA:</label>
                            <input type="datetime-local" id="eventoFecha" required>
                        </div>
                        
                        <div class="form-group">
                            <label>🎭 TIPO:</label>
                            <select id="eventoTipo">
                                <option value="personal">🌸 Personal</option>
                                <option value="universidad">📚 Universidad</option>
                                <option value="examen">📝 Examen</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>📝 DESCRIPCIÓN:</label>
                            <textarea id="eventoDesc" rows="2" placeholder="Detalles..."></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label>⏱️ ALARMA:</label>
                            <select id="alarmaTiempo">
                                <option value="0">🔔 En el momento</option>
                                <option value="5">⏰ 5 minutos antes</option>
                                <option value="15">⏰ 15 minutos antes</option>
                                <option value="30">⏰ 30 minutos antes</option>
                                <option value="60">⏰ 1 hora antes</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn">⚡ GUARDAR CON ALARMA ⚡</button>
                    </form>

                    <!-- CALENDARIO -->
                    <div style="margin-top: 25px;">
                        <div class="card-title" style="color: #00ffff;">
                            <span>📆</span> CALENDARIO
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;">
                            <button class="btn-small" id="prevMonthBtn" style="border-color: #ff1493; color: #ff1493;">←</button>
                            <span id="monthYearDisplay" style="color: #00ffff; text-shadow: 0 0 8px cyan; font-weight: bold; font-size: clamp(0.9rem, 2.5vw, 1.2rem);"></span>
                            <button class="btn-small" id="nextMonthBtn" style="border-color: #ff1493; color: #ff1493;">→</button>
                        </div>
                        <div class="calendario-grid" id="calendarioGrid"></div>
                    </div>
                </div>

                <!-- COLUMNA 3: PRÓXIMOS EVENTOS -->
                <div class="card">
                    <div class="card-title" style="color: #ff00ff;">
                        <span>⚡</span> PRÓXIMOS EVENTOS
                    </div>
                    
                    <div class="eventos-container" id="eventosContainer"></div>
                    
                    <div style="margin-top: 20px; display: grid; gap: 8px;">
                        <button class="btn-small" onclick="verificarAlarmas()" style="border-color: #00ffff; color: #00ffff; width: 100%;">🔔 VERIFICAR ALARMAS</button>
                        <button class="btn-small" onclick="compartirWhatsApp()" style="border-color: #25D366; color: #25D366; width: 100%;">📱 COMPARTIR</button>
                        <button class="btn-small" onclick="exportarRespaldo()" style="border-color: #ff1493; color: #ff1493; width: 100%;">💾 RESPALDO</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTÓN WHATSAPP FLOTANTE -->
    <div class="whatsapp-share" onclick="compartirWhatsApp()" title="Compartir en WhatsApp">
        📱
    </div>

    <script>
        // ==================== MATERIAS EN SECUENCIA HORARIA ====================
        const materias = [
            // SEMANA 1
            {
                nombre: "PRACTICA EN OTROS CONTEXTOS I",
                codigo: "5031553",
                horaInicio: "7:00 am",
                horaFin: "11:00 am",
                duracion: "4h",
                semana: "1",
                orden: 1,
                horaCompleta: "7:00 am - 11:00 am"
            },
            {
                nombre: "SEMINARIO EDUCACIÓN ARTÍSTICA",
                codigo: "5031555",
                horaInicio: "11:00 am",
                horaFin: "2:00 pm",
                duracion: "3h",
                semana: "1",
                orden: 2,
                horaCompleta: "11:00 am - 2:00 pm"
            },
            {
                nombre: "TALLER EXPLORACIÓN CORPORAL",
                codigo: "1202104",
                horaInicio: "2:00 pm",
                horaFin: "5:00 pm",
                duracion: "3h",
                semana: "1",
                orden: 3,
                horaCompleta: "2:00 pm - 5:00 pm"
            },
            
            // SEMANA 2
            {
                nombre: "TEXTO Y REPRESENTACION TEATRAL",
                codigo: "1102134",
                horaInicio: "7:00 am",
                horaFin: "11:00 am",
                duracion: "4h",
                semana: "2",
                orden: 1,
                horaCompleta: "7:00 am - 11:00 am"
            },
            {
                nombre: "FUNDAMENTOS CREACIÓN MUSICAL",
                codigo: "1102135",
                horaInicio: "11:00 am",
                horaFin: "3:00 pm",
                duracion: "4h",
                semana: "2",
                orden: 2,
                horaCompleta: "11:00 am - 3:00 pm"
            },
            {
                nombre: "DIDACTICA DE LA MUSICA",
                codigo: "5031554",
                horaInicio: "3:00 pm",
                horaFin: "7:00 pm",
                duracion: "4h",
                semana: "2",
                orden: 3,
                horaCompleta: "3:00 pm - 7:00 pm"
            }
        ];

        let eventos = JSON.parse(localStorage.getItem('eventosYobanaNeon')) || [];
        let notasConfidenciales = localStorage.getItem('notasYobanaNeon') || '';
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();

        const horarioContainer = document.getElementById('horarioContainer');
        const eventosContainer = document.getElementById('eventosContainer');
        const fechaActualElement = document.getElementById('fechaActual');
        const notasTextarea = document.getElementById('notasConfidenciales');
        const eventoForm = document.getElementById('eventoForm');
        const calendarioGrid = document.getElementById('calendarioGrid');
        const monthYearDisplay = document.getElementById('monthYearDisplay');

        function mostrarHorarioSecuencial() {
            horarioContainer.innerHTML = '';
            
            const semana1 = materias.filter(m => m.semana === "1").sort((a, b) => a.orden - b.orden);
            const semana2 = materias.filter(m => m.semana === "2").sort((a, b) => a.orden - b.orden);
            
            // Semana 1
            const semana1Block = document.createElement('div');
            semana1Block.className = 'semana-block';
            semana1Block.innerHTML = '<div class="semana-titulo">📅 SEMANA 1</div>';
            
            semana1.forEach(clase => {
                const claseDiv = document.createElement('div');
                claseDiv.className = 'clase-item';
                claseDiv.style.borderLeftColor = getColorPorHora(clase.horaInicio);
                claseDiv.innerHTML = `
                    <div class="clase-hora">⏰ ${clase.horaCompleta}</div>
                    <div class="clase-nombre">${clase.nombre}</div>
                    <div class="clase-codigo">📌 ${clase.codigo}</div>
                    <span class="clase-duracion">⏱️ ${clase.duracion}</span>
                `;
                semana1Block.appendChild(claseDiv);
            });
            
            // Semana 2
            const semana2Block = document.createElement('div');
            semana2Block.className = 'semana-block';
            semana2Block.innerHTML = '<div class="semana-titulo">📅 SEMANA 2</div>';
            
            semana2.forEach(clase => {
                const claseDiv = document.createElement('div');
                claseDiv.className = 'clase-item';
                claseDiv.style.borderLeftColor = getColorPorHora(clase.horaInicio);
                claseDiv.innerHTML = `
                    <div class="clase-hora">⏰ ${clase.horaCompleta}</div>
                    <div class="clase-nombre">${clase.nombre}</div>
                    <div class="clase-codigo">📌 ${clase.codigo}</div>
                    <span class="clase-duracion">⏱️ ${clase.duracion}</span>
                `;
                semana2Block.appendChild(claseDiv);
            });
            
            horarioContainer.appendChild(semana1Block);
            horarioContainer.appendChild(semana2Block);
        }

        function getColorPorHora(hora) {
            if (hora.includes('7:00')) return '#ff1493';
            if (hora.includes('11:00')) return '#00ffff';
            if (hora.includes('2:00') || hora.includes('3:00')) return '#ffaa00';
            return '#ff1493';
        }

        function actualizarFechaActual() {
            const opciones = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            fechaActualElement.textContent = new Date().toLocaleDateString('es-ES', opciones);
        }

        function mostrarEventos() {
            eventosContainer.innerHTML = '';
            
            if (eventos.length === 0) {
                eventosContainer.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">✨ No hay eventos ✨</p>';
                return;
            }

            eventos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            const ahora = new Date();
            const eventosFuturos = eventos.filter(e => new Date(e.fecha) > ahora).slice(0, 10);
            
            eventosFuturos.forEach((evento, index) => {
                const fechaEvento = new Date(evento.fecha);
                const opcionesFecha = { 
                    weekday: 'short', 
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                };
                
                const eventoCard = document.createElement('div');
                eventoCard.className = `evento-card ${evento.tipo}`;
                eventoCard.innerHTML = `
                    <div class="evento-fecha">⚡ ${fechaEvento.toLocaleDateString('es-ES', opcionesFecha)}</div>
                    <div style="font-weight: bold; margin: 5px 0;">${evento.titulo}</div>
                    <div style="font-size: 0.9em; color: #ccc; margin-bottom: 8px;">${evento.descripcion || ''}</div>
                    <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                        <button class="btn-small" onclick="eliminarEvento(${index})" style="border-color: #f44336; color: #f44336; padding: 4px 8px;">✖</button>
                        <button class="btn-small" onclick="editarEvento(${index})" style="border-color: #00ffff; color: #00ffff; padding: 4px 8px;">✎</button>
                    </div>
                `;
                eventosContainer.appendChild(eventoCard);
            });
        }

        eventoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fechaEvento = new Date(document.getElementById('eventoFecha').value);
            const alarmaTiempo = parseInt(document.getElementById('alarmaTiempo').value);
            
            if (alarmaTiempo > 0) {
                const tiempoAlarma = new Date(fechaEvento.getTime() - (alarmaTiempo * 60 * 1000));
                const ahora = new Date();
                
                if (tiempoAlarma > ahora) {
                    const tiempoEspera = tiempoAlarma - ahora;
                    setTimeout(() => {
                        if (Notification.permission === 'granted') {
                            new Notification('🔔 ALARMA YOBANA', {
                                body: document.getElementById('eventoTitulo').value
                            });
                        }
                        alert(`🔔 ${document.getElementById('eventoTitulo').value}`);
                    }, tiempoEspera);
                }
            }
            
            const nuevoEvento = {
                titulo: document.getElementById('eventoTitulo').value,
                fecha: document.getElementById('eventoFecha').value,
                tipo: document.getElementById('eventoTipo').value,
                descripcion: document.getElementById('eventoDesc').value,
                alarmaTiempo: alarmaTiempo
            };
            
            eventos.push(nuevoEvento);
            localStorage.setItem('eventosYobanaNeon', JSON.stringify(eventos));
            
            eventoForm.reset();
            mostrarEventos();
            renderCalendario();
            alert('✅ Evento guardado');
        });

        window.eliminarEvento = (index) => {
            eventos.splice(index, 1);
            localStorage.setItem('eventosYobanaNeon', JSON.stringify(eventos));
            mostrarEventos();
            renderCalendario();
        };

        window.editarEvento = (index) => {
            const evento = eventos[index];
            document.getElementById('eventoTitulo').value = evento.titulo;
            document.getElementById('eventoFecha').value = evento.fecha;
            document.getElementById('eventoTipo').value = evento.tipo;
            document.getElementById('eventoDesc').value = evento.descripcion || '';
            eliminarEvento(index);
        };

        window.verificarAlarmas = () => {
            const ahora = new Date();
            eventos.forEach(evento => {
                const fechaEvento = new Date(evento.fecha);
                const diferencia = Math.round((fechaEvento - ahora) / (1000 * 60));
                if (diferencia <= 5 && diferencia >= 0) {
                    alert(`🔔 PRONTO: ${evento.titulo}`);
                }
            });
        };

        if (notasConfidenciales) notasTextarea.value = notasConfidenciales;
        notasTextarea.addEventListener('input', (e) => {
            localStorage.setItem('notasYobanaNeon', e.target.value);
        });

        function renderCalendario() {
            const monthNames = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            monthYearDisplay.textContent = `${monthNames[currentMonth]} ${currentYear}`;
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let startDay = firstDay === 0 ? 6 : firstDay - 1;
            
            let calendarHTML = '';
            const weekDays = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
            weekDays.forEach(day => {
                calendarHTML += `<div class="calendario-dia-header">${day}</div>`;
            });
            
            for (let i = 0; i < startDay; i++) {
                calendarHTML += '<div class="calendario-dia"></div>';
            }
            
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const fechaComparar = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const tieneEvento = eventos.some(e => e.fecha.startsWith(fechaComparar));
                const isToday = day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
                
                calendarHTML += `<div class="calendario-dia ${isToday ? 'today' : ''} ${tieneEvento ? 'has-evento' : ''}" 
                                    onclick="seleccionarDia(${currentYear}, ${currentMonth}, ${day})">${day}</div>`;
            }
            
            calendarioGrid.innerHTML = calendarHTML;
        }

        window.seleccionarDia = (year, month, day) => {
            document.getElementById('eventoFecha').value = 
                `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}T12:00`;
        };

        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            renderCalendario();
        });

        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            renderCalendario();
        });

        window.compartirWhatsApp = () => {
            let mensaje = "⚡ *MI HORARIO* ⚡\n\n";
            mensaje += "*SEMANA 1:*\n";
            materias.filter(m => m.semana === "1").sort((a, b) => a.orden - b.orden).forEach(m => {
                mensaje += `⏰ ${m.horaCompleta}\n📌 ${m.nombre}\n\n`;
            });
            mensaje += "*SEMANA 2:*\n";
            materias.filter(m => m.semana === "2").sort((a, b) => a.orden - b.orden).forEach(m => {
                mensaje += `⏰ ${m.horaCompleta}\n📌 ${m.nombre}\n\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
        };

        window.exportarRespaldo = () => {
            const respaldo = {
                eventos: eventos,
                notas: notasTextarea.value,
                fecha: new Date().toLocaleString()
            };
            const dataStr = JSON.stringify(respaldo);
            const link = document.createElement('a');
            link.download = `yobana_backup_${new Date().toISOString().slice(0,10)}.json`;
            link.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(dataStr);
            link.click();
        };

        if (Notification.permission !== 'granted') Notification.requestPermission();

        function inicializar() {
            mostrarHorarioSecuencial();
            actualizarFechaActual();
            mostrarEventos();
            renderCalendario();
            setInterval(actualizarFechaActual, 1000);
        }

        inicializar();
    </script>
</body>
</html>
