<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        :root {
            --neon-pink: #ff1493;
            --neon-cyan: #00ffff;
            --neon-purple: #ff00ff;
            --neon-orange: #ffaa00;
            --whatsapp: #25D366;
            --bg-dark: #000000;
            --bg-card: #111111;
            --bg-item: #1a1a1a;
        }

        html {
            font-size: 13px;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            padding: 10px;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 20, 147, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.15) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            background: var(--bg-card);
            border-radius: 25px 25px 0 0;
            padding: 20px;
            border: 3px solid var(--neon-pink);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.6);
            margin-bottom: 2px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 15px var(--neon-pink);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 12px var(--neon-cyan);
            margin-bottom: 12px;
        }

        .date-badge {
            background: rgba(255, 20, 147, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }

        .main-panel {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 0 0 25px 25px;
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            border: 3px solid;
            transition: all 0.3s;
        }

        .card:nth-child(1) { border-color: var(--neon-pink); box-shadow: 0 0 25px rgba(255, 20, 147, 0.4); }
        .card:nth-child(2) { border-color: var(--neon-cyan); box-shadow: 0 0 25px rgba(0, 255, 255, 0.4); }
        .card:nth-child(3) { border-color: var(--neon-purple); box-shadow: 0 0 25px rgba(255, 0, 255, 0.4); }

        .card-title {
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-bottom: 3px solid currentColor;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 10px currentColor;
        }

        /* MATERIAS COMPLETAS */
        .materia-completa {
            background: #000000;
            border-radius: 15px;
            margin-bottom: 15px;
            padding: 15px;
            border-left: 8px solid;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
        }

        .materia-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .materia-nombre {
            color: var(--neon-cyan);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        .materia-codigo {
            color: var(--neon-pink);
            font-size: 1rem;
            background: rgba(255,20,147,0.2);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .materia-horario {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            color: white;
            font-size: 1rem;
        }

        .materia-docente {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 4px solid var(--neon-orange);
        }

        .docente-email {
            color: var(--neon-orange);
            font-size: 0.95rem;
            word-break: break-all;
        }

        .fechas-container {
            margin-top: 12px;
        }

        .fechas-titulo {
            color: var(--neon-cyan);
            font-size: 1rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .fechas-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .fecha-badge {
            background: rgba(255,20,147,0.2);
            border: 1px solid var(--neon-pink);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.9rem;
            color: white;
        }

        .fecha-badge.ap { background: rgba(0,255,255,0.2); border-color: var(--neon-cyan); }
        .fecha-badge.tutoria { background: rgba(255,165,0,0.2); border-color: orange; }
        .fecha-badge.convocatoria { background: rgba(255,0,255,0.2); border-color: var(--neon-purple); }

        /* FORMULARIO */
        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--neon-cyan);
            font-weight: 600;
            font-size: 1rem;
        }

        .form-group input, 
        .form-group textarea, 
        .form-group select {
            width: 100%;
            padding: 10px;
            background: #000000;
            border: 2px solid var(--neon-pink);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        .file-upload {
            border: 2px dashed var(--neon-cyan);
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            background: #000;
            margin-bottom: 10px;
        }

        .link-item {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* LINKS CLICKEABLES - CORREGIDO */
        .link-clickeable {
            color: #00ffff;
            text-decoration: none;
            word-break: break-all;
            padding: 5px 10px;
            background: rgba(0,255,255,0.1);
            border-radius: 5px;
            display: inline-block;
            margin: 2px;
            border: 1px solid #00ffff;
            transition: all 0.3s;
        }

        .link-clickeable:hover {
            background: #00ffff;
            color: black;
            transform: scale(1.05);
        }

        .archivo-clickeable {
            color: #ff1493;
            text-decoration: none;
            word-break: break-all;
            padding: 5px 10px;
            background: rgba(255,20,147,0.1);
            border-radius: 5px;
            display: inline-block;
            margin: 2px;
            border: 1px solid #ff1493;
            transition: all 0.3s;
        }

        .archivo-clickeable:hover {
            background: #ff1493;
            color: black;
            transform: scale(1.05);
        }

        .btn {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            color: black;
            font-weight: bold;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            border: 2px solid white;
            box-shadow: 0 0 15px var(--neon-pink);
            margin-top: 5px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.95rem;
            background: transparent;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* CALENDARIO */
        .calendario-wrapper {
            background: #000000;
            border-radius: 15px;
            padding: 12px;
            border: 3px solid var(--neon-cyan);
            margin-top: 15px;
        }

        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendario-dia-header {
            text-align: center;
            font-weight: bold;
            color: var(--neon-cyan);
            padding: 6px 2px;
            border-bottom: 2px solid var(--neon-pink);
            font-size: 0.9rem;
        }

        .calendario-dia {
            aspect-ratio: 1;
            background: #111111;
            border: 1px solid var(--neon-pink);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .calendario-dia.today { background: var(--neon-pink); color: black; }
        .calendario-dia.has-evento { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }

        /* ACTIVIDADES DEL DÍA */
        .dia-actividades {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            border: 2px solid var(--neon-orange);
        }

        .actividad-item {
            background: #000;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--neon-cyan);
        }

        /* WHATSAPP FLOTANTE */
        .whatsapp-share {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: transparent;
            border: 3px solid var(--whatsapp);
            color: var(--whatsapp);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 0 20px var(--whatsapp);
            z-index: 1000;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px var(--whatsapp); }
            50% { box-shadow: 0 0 35px var(--whatsapp); }
        }

        .editando-indicator {
            background: var(--neon-orange);
            color: black;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }

        /* OPCIONES DE EXPORTACIÓN */
        .export-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }

        @media screen and (max-width: 480px) {
            html { font-size: 12px; }
            .header h1 { font-size: 1.8rem; }
            .card-title { font-size: 1.3rem; }
        }
    </style>
</head>

        const btnCancelarEdicion = document.getElementById('btnCancelarEdicion');
        const btnGuardar = document.getElementById('btnGuardar');

        // ===== MOSTRAR HORARIO COMPLETO =====
        function mostrarHorarioCompleto() {
            horarioContainer.innerHTML = '';
            materiasCompletas.forEach(m => {
                // Convertir fechas para mostrar
                const apFormateada = m.fechas.ap ? formatearFechaParaMostrar(m.fechas.ap) : '';
                const tutoriasFormateadas = m.fechas.tutorias ? m.fechas.tutorias.map(f => formatearFechaParaMostrar(f)) : [];
                const convocatoriasFormateadas = m.fechas.convocatorias ? m.fechas.convocatorias.map(f => formatearFechaParaMostrar(f)) : [];
                
                const materiaDiv = document.createElement('div');
                materiaDiv.className = 'materia-completa';

                fechasHtml += `<div class="fechas-titulo">📌 AP: <span class="fecha-badge ap">${apFormateada}</span></div>`;
                
                if (tutoriasFormateadas.length > 0) {
                    fechasHtml += '<div class="fechas-titulo" style="margin-top:8px;">👥 Tutorías:</div>';
                    fechasHtml += '<div class="fechas-grid">';
                    tutoriasFormateadas.forEach(f => fechasHtml += `<span class="fecha-badge tutoria">${f}</span>`);
                    fechasHtml += '</div>';
                }
                
                if (convocatoriasFormateadas.length > 0) {
                    fechasHtml += '<div class="fechas-titulo" style="margin-top:8px;">📢 Convocatorias:</div>';
                    fechasHtml += '<div class="fechas-grid">';
                    convocatoriasFormateadas.forEach(f => fechasHtml += `<span class="fecha-badge convocatoria">${f}</span>`);
                    fechasHtml += '</div>';
                }
                fechasHtml += '</div>';
                
                materiaDiv.innerHTML = `
                    <div class="materia-header">
                        <span class="materia-nombre">${m.nombre}</span>
                        <span class="materia-codigo">${m.codigo}</span>
                    </div>
                    <div class="materia-horario">
                        <span>📅 Semana ${m.semana} - ${m.dia}</span>
                        <span>⏰ ${m.hora}</span>
                        <span>⏱️ ${m.duracion}</span>
                    </div>
                    <div class="materia-docente">
                        <div>👩‍🏫 ${m.docente}</div>
                        ${m.email ? `<div class="docente-email">📧 ${m.email}</div>` : ''}
                    </div>
                    ${fechasHtml}
                `;
                horarioContainer.appendChild(materiaDiv);
            });
        }

        // ===== FORMATEAR FECHAS =====
        function formatearFechaParaMostrar(fechaStr) {
            const partes = fechaStr.split('-');
            if (partes.length === 3) {
                const año = partes[0];
                const mes = partes[1];
                const dia = partes[2];
                const meses = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
                return `${dia}-${meses[parseInt(mes)-1]}-${año}`;
            }
            return fechaStr;
        }

        // ===== FUNCIÓN PARA OBTENER MATERIAS POR FECHA =====
        function obtenerMateriasPorFecha(fecha) {
            const fechaStr = fecha.toISOString().split('T')[0];
            const materiasDelDia = [];
            
            materiasCompletas.forEach(m => {
                // Verificar AP
                if (m.fechas.ap === fechaStr) {
                    materiasDelDia.push({...m, tipo: 'AP'});
                }
                
                // Verificar tutorías
                if (m.fechas.tutorias && m.fechas.tutorias.includes(fechaStr)) {
                    materiasDelDia.push({...m, tipo: 'Tutoría'});
                }
                
                // Verificar convocatorias
                if (m.fechas.convocatorias && m.fechas.convocatorias.includes(fechaStr)) {
                    materiasDelDia.push({...m, tipo: 'Convocatoria'});
                }
            });
            
            return materiasDelDia;
        }

        // ===== FUNCIONES PARA LINKS/ARCHIVOS =====
        window.agregarLink = () => {
            const link = document.getElementById('linkInput').value;
            if (link) {
                linksTemp.push(link);
                actualizarLinksUI();
                document.getElementById('linkInput').value = '';
            }
        };

        window.agregarArchivo = () => {
            const arch = document.getElementById('archivoInput').value;
            if (arch) {
                archivosTemp.push(arch);
                actualizarArchivosUI();
                document.getElementById('archivoInput').value = '';
            }
        };

        function actualizarLinksUI() {
            linksContainer.innerHTML = '';
            linksTemp.forEach((link, i) => {
                linksContainer.innerHTML += `
                    <div class="link-item">
                        <a href="${link}" target="_blank" class="link-clickeable">🔗 ${link.substring(0,30)}...</a>
                        <button class="btn-small" onclick="eliminarLink(${i})" style="border-color: #f44336; color: #f44336; padding: 2px 5px;">✖</button>
                    </div>
                `;
            });
        }

        function actualizarArchivosUI() {
            archivosContainer.innerHTML = '';
            archivosTemp.forEach((arch, i) => {
                archivosContainer.innerHTML += `
                    <div class="link-item">
                        <a href="${arch}" target="_blank" class="archivo-clickeable">📎 ${arch.substring(0,30)}...</a>
                        <button class="btn-small" onclick="eliminarArchivo(${i})" style="border-color: #f44336; color: #f44336; padding: 2px 5px;">✖</button>
                    </div>
                `;
            });
        }

        window.eliminarLink = (i) => {
            linksTemp.splice(i, 1);
            actualizarLinksUI();
        };

        window.eliminarArchivo = (i) => {
            archivosTemp.splice(i, 1);
            actualizarArchivosUI();
        };

        // ===== GUARDAR O ACTUALIZAR EVENTO =====
        eventoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fechaEvento = new Date(document.getElementById('eventoFecha').value);
            const alarmaTiempo = parseInt(document.getElementById('alarmaTiempo').value);
            
            // Programar alarma
            if (alarmaTiempo > 0) {
                const tiempoAlarma = new Date(fechaEvento.getTime() - (alarmaTiempo * 60 * 1000));
                const ahora = new Date();
                if (tiempoAlarma > ahora) {
                    setTimeout(() => {
                        if (Notification.permission === 'granted') {
                            new Notification('🔔 ALARMA ACTIVADA', { 
                                body: document.getElementById('eventoTitulo').value 
                            });
                        }
                        alert(`🔔 ${document.getElementById('eventoTitulo').value}`);
                    }, tiempoAlarma - ahora);
                }
            }
            
            const eventoData = {
                id: editandoId || Date.now(),
                titulo: document.getElementById('eventoTitulo').value,
                fecha: document.getElementById('eventoFecha').value,
                tipo: document.getElementById('eventoTipo').value,
                descripcion: document.getElementById('eventoDesc').value,
                alarma: alarmaTiempo,
                links: [...linksTemp],
                archivos: [...archivosTemp],
                ultimaModificacion: new Date().toISOString()
            };
            
            if (editandoId) {
                // Actualizar evento existente
                const index = eventos.findIndex(e => e.id == editandoId);
                if (index !== -1) {
                    eventos[index] = eventoData;
                }
                cancelarEdicion();
            } else {
                // Nuevo evento
                eventos.push(eventoData);
            }
            
            localStorage.setItem('eventosYobanaNeonCompleta', JSON.stringify(eventos));
            
            // Limpiar formulario
            eventoForm.reset();
            linksTemp = [];
            archivosTemp = [];
            actualizarLinksUI();
            actualizarArchivosUI();
            
            mostrarEventos();
            renderCalendario();
            if (fechaSeleccionada) mostrarActividadesDia(fechaSeleccionada);
            
            alert(editandoId ? '✅ EVENTO ACTUALIZADO' : '✅ EVENTO GUARDADO');
        });

        // ===== EDITAR EVENTO =====
        window.editarEvento = (id) => {
            const evento = eventos.find(e => e.id == id);
            if (!evento) return;
            
            editandoId = id;
            
            document.getElementById('eventoTitulo').value = evento.titulo || '';
            document.getElementById('eventoFecha').value = evento.fecha || '';
            document.getElementById('eventoTipo').value = evento.tipo || 'personal';
            document.getElementById('eventoDesc').value = evento.descripcion || '';
            document.getElementById('alarmaTiempo').value = evento.alarma || '0';
            
            linksTemp = evento.links || [];
            archivosTemp = evento.archivos || [];
            actualizarLinksUI();
            actualizarArchivosUI();
            
            editandoIndicator.style.display = 'block';
            editandoIdSpan.textContent = id;
            btnCancelarEdicion.style.display = 'block';
            btnGuardar.textContent = '⚡ ACTUALIZAR EVENTO ⚡';
        };

        window.cancelarEdicion = () => {
            editandoId = null;
            eventoForm.reset();
            linksTemp = [];
            archivosTemp = [];
            actualizarLinksUI();
            actualizarArchivosUI();
            editandoIndicator.style.display = 'none';
            btnCancelarEdicion.style.display = 'none';
            btnGuardar.textContent = '⚡ GUARDAR EVENTO ⚡';
        };

        window.eliminarEvento = (id) => {
            if (confirm('¿Eliminar este evento?')) {
                eventos = eventos.filter(e => e.id != id);
                localStorage.setItem('eventosYobanaNeonCompleta', JSON.stringify(eventos));
                mostrarEventos();
                renderCalendario();
                if (fechaSeleccionada) mostrarActividadesDia(fechaSeleccionada);
                if (editandoId == id) cancelarEdicion();
            }
        };

        // ===== MOSTRAR EVENTOS =====
        function mostrarEventos() {
            eventosContainer.innerHTML = '';
            if (eventos.length === 0) {
                eventosContainer.innerHTML = '<p style="text-align: center; padding: 20px;">✨ No hay eventos guardados ✨</p>';
                return;
            }
            
            eventos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            
            eventos.forEach((e) => {
                const f = new Date(e.fecha);
                const eventosCard = document.createElement('div');
                eventosCard.className = 'evento-card';
                eventosCard.style.background = '#1a1a1a';
                eventosCard.style.padding = '12px';
                eventosCard.style.marginBottom = '10px';
                eventosCard.style.borderRadius = '10px';
                eventosCard.style.borderLeft = '6px solid #00ffff';
                
                let linksHtml = '';
                if (e.links && e.links.length) {
                    linksHtml = '<div style="margin-top:8px;">🔗 ';

                        linksHtml += `<a href="${l}" target="_blank" class="link-clickeable" style="margin-right:5px;">link</a>`;
                    });
                    linksHtml += '</div>';
                }
                
                let archivosHtml = '';
                if (e.archivos && e.archivos.length) {
                    archivosHtml = '<div style="margin-top:5px;">📎 ';

                        archivosHtml += `<a href="${a}" target="_blank" class="archivo-clickeable" style="margin-right:5px;">archivo</a>`;
                    });
                    archivosHtml += '</div>';
                }
                
                eventosCard.innerHTML = `
                    <div style="color: #00ffff;">📅 ${f.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</div>
                    <div style="font-weight: bold; font-size: 1.1rem; margin: 5px 0;">${e.titulo}</div>
                    <div style="color: #ccc; font-size: 0.95rem;">${e.descripcion || ''}</div>
                    ${linksHtml}
                    ${archivosHtml}
                    <div style="margin-top: 8px; display: flex; gap: 5px;">
                        <button class="btn-small" onclick="editarEvento('${e.id}')" style="border-color: #00ffff; color: #00ffff;">✏️ EDITAR</button>
                        <button class="btn-small" onclick="eliminarEvento('${e.id}')" style="border-color: #f44336; color: #f44336;">✖</button>
                    </div>
                `;
                eventosContainer.appendChild(eventosCard);
            });
        }

        // ===== CALENDARIO =====
        function renderCalendario() {
            const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            monthYearDisplay.textContent = `${months[currentMonth]} ${currentYear}`;
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let startDay = firstDay === 0 ? 6 : firstDay - 1;
            
            let html = '';
            const weekDays = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
            weekDays.forEach(d => html += `<div class="calendario-dia-header">${d}</div>`);
            
            for (let i = 0; i < startDay; i++) html += '<div class="calendario-dia" style="opacity:0.3"></div>';
            
            const today = new Date();
            for (let d = 1; d <= daysInMonth; d++) {
                const fechaStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const tieneEvento = eventos.some(e => e.fecha.startsWith(fechaStr));
                const esHoy = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
                
                let clase = 'calendario-dia';
                if (esHoy) clase += ' today';
                if (tieneEvento) clase += ' has-evento';
                
                html += `<div class="${clase}" onclick="seleccionarFecha(${currentYear}, ${currentMonth}, ${d})">${d}</div>`;
            }
            
            const totalCeldas = startDay + daysInMonth;
            for (let i = totalCeldas; i < 42; i++) html += '<div class="calendario-dia" style="opacity:0.3"></div>';
            
            calendarioGrid.innerHTML = html;
        }

        // ===== VER ACTIVIDADES DE UNA FECHA =====
        window.seleccionarFecha = (year, month, day) => {
            const fecha = new Date(year, month, day);
            const fechaStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            fechaSeleccionada = fechaStr;
            
            // Eventos de esa fecha
            const eventosDelDia = eventos.filter(e => e.fecha.startsWith(fechaStr));
            
            // Materias de esa fecha (CORREGIDO - ahora filtra por fecha real)
            const materiasDelDia = obtenerMateriasPorFecha(fecha);
            
            fechaSeleccionadaTitulo.innerHTML = `📅 ${fecha.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}`;
            
            let listaHtml = '';
            
            if (materiasDelDia.length > 0) {
                listaHtml += '<div style="color: #00ffff; margin: 10px 0;">🎭 ACTIVIDADES ACADÉMICAS:</div>';
                materiasDelDia.forEach(m => {
                    listaHtml += `
                        <div class="actividad-item">
                            <div style="font-weight: bold; color: #ff1493;">${m.nombre}</div>
                            <div>📌 ${m.tipo} - ${m.codigo}</div>
                            <div>⏰ ${m.hora}</div>
                            <div>👩‍🏫 ${m.docente}</div>
                        </div>
                    `;
                });
            }
            
            if (eventosDelDia.length > 0) {
                listaHtml += '<div style="color: #ff00ff; margin: 10px 0;">📌 MIS EVENTOS:</div>';
                eventosDelDia.forEach(e => {
                    const fechaHora = new Date(e.fecha);
                    
                    let linksHtml = '';
                    if (e.links && e.links.length) {
                        linksHtml = '<div style="margin-top:5px;">🔗 ';
                        e.links.forEach(l => {
                            linksHtml += `<a href="${l}" target="_blank" class="link-clickeable">link</a> `;
                        });
                        linksHtml += '</div>';
                    }
                    
                    let archivosHtml = '';
                    if (e.archivos && e.archivos.length) {
                        archivosHtml = '<div style="margin-top:5px;">📎 ';
                        e.archivos.forEach(a => {
                            archivosHtml += `<a href="${a}" target="_blank" class="archivo-clickeable">archivo</a> `;
                        });
                        archivosHtml += '</div>';
                    }
                    
                    listaHtml += `
                        <div class="actividad-item">
                            <div style="font-weight: bold;">${e.titulo}</div>
                            <div>⏰ ${fechaHora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}</div>
                            ${e.descripcion ? `<div style="color: #ccc;">📝 ${e.descripcion}</div>` : ''}
                            ${linksHtml}
                            ${archivosHtml}
                            <div style="margin-top: 5px;">
                                <button class="btn-small" onclick="editarEvento('${e.id}')" style="border-color: #00ffff; color: #00ffff; padding: 2px 5px;">✏️</button>
                            </div>
                        </div>
                    `;
                });
            }
            
            if (materiasDelDia.length === 0 && eventosDelDia.length === 0) {
                listaHtml = '<div style="text-align: center; padding: 20px;">✨ Sin actividades programadas ✨</div>';
            }
            
            listaActividadesDia.innerHTML = listaHtml;
            actividadesDelDia.style.display = 'block';
        };

        // ===== COMPARTIR AGENDA COMPLETA EN WHATSAPP =====

                msg += `   👩‍🏫 ${m.docente}\n`;

                    msg += `   📌 AP: ${formatearFechaParaMostrar(m.fechas.ap)}\n`;

                        const convsFormateadas = m.fechas.convocatorias.map(f => formatearFechaParaMostrar(f)).join(', ');
                        msg += `   📢 Convocatorias: ${convsFormateadas}\n`;
                    }
                }
            });
            
            // PRÓXIMOS EVENTOS
            msg += "\n\n⏰ *PRÓXIMOS EVENTOS:*\n";

            eventos.forEach(e => {
                const fecha = new Date(e.fecha);
                const diff = Math.round((fecha - ahora) / (1000 * 60));
                if (diff <= 5 && diff >= 0) {
                    alert(`🔔 ${e.titulo} - ${e.descripcion || ''}`);
                    activas = true;
                }
            });
            if (!activas) alert('✨ No hay alarmas próximas');
        };

        // ===== NOTAS =====
        if (notas) notasTextarea.value = notas;
        notasTextarea.addEventListener('input', (e) => {
            localStorage.setItem('notasYobanaNeonCompleta', e.target.value);
        });

        // ===== NAVEGACIÓN MESES =====
        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            if (currentMonth === 0) { currentMonth = 11; currentYear--; } 
            else { currentMonth--; }
            renderCalendario();
        });

        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            if (currentMonth === 11) { currentMonth = 0; currentYear++; } 
            else { currentMonth++; }
            renderCalendario();
        });

        // ===== FECHA ACTUAL =====
        function actualizarFecha() {
            const op = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            fechaActualElement.textContent = new Date().toLocaleDateString('es-ES', op);
        }

        // ===== PERMISOS =====
        if (Notification.permission !== 'granted') Notification.requestPermission();

        // ===== INICIALIZAR =====
        function init() {
            mostrarHorarioCompleto();
            actualizarFecha();
            mostrarEventos();
            renderCalendario();
            setInterval(actualizarFecha, 60000);
        }
        
        init();
    </script>
</body>
</html>
